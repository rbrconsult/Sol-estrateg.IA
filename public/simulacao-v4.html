<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOl.estrateg.IA - Evolve Energia Solar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#0d1117;min-height:100vh;display:flex;overflow:hidden;color:#fff}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes liveDot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes progressFill{from{width:0}to{width:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:#161b22;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;height:100vh}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.sidebar-logo .sun{font-size:18px}
.sidebar-logo .brand{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#f7b731,#fd9644);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-sub{color:rgba(255,255,255,.25);font-size:10px;letter-spacing:.3px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.group-label{font-size:8.5px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:12px 16px 6px}
.flow-card{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.flow-card:hover{background:rgba(255,255,255,.03)}
.flow-card.active{background:rgba(37,211,102,.06);border-left-color:#25d366}
.flow-card .fc-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:-.1px}
.flow-card.active .fc-name{color:#25d366}
.flow-card .fc-sub{font-size:10px;color:rgba(255,255,255,.25);margin-top:2px}
.flow-card .fc-badge{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.fc-badge.conversa{background:rgba(37,211,102,.12);color:#25d366}
.fc-badge.notif{background:rgba(255,149,0,.12);color:#ff9500}
.fc-badge.alerta{background:rgba(255,59,48,.12);color:#ff3b30}
.live-ind{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .3s}
.flow-card.playing .live-ind{opacity:1}
.live-ind .dot{width:5px;height:5px;border-radius:50%;background:#25d366;animation:liveDot 1.2s infinite}
.live-ind .lt{font-size:8px;font-weight:700;color:#25d366;letter-spacing:.5px;text-transform:uppercase}
.flow-card{position:relative}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#0d1117}
.main-top{padding:14px 24px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-top-left{display:flex;align-items:center;gap:12px}
.app-title{font-size:15px;font-weight:800;letter-spacing:-.2px}
.app-title .sol{background:linear-gradient(135deg,#f7b731,#fd9644);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-title .rest{color:rgba(255,255,255,.4);font-weight:400}
.flow-label{font-size:12px;color:rgba(255,255,255,.5);padding-left:12px;border-left:1px solid rgba(255,255,255,.1)}
.btn-play{padding:8px 20px;background:linear-gradient(135deg,#25d366,#128c7e);border:none;border-radius:10px;cursor:pointer;color:#fff;font-size:12px;font-weight:700;font-family:inherit;transition:all .25s;box-shadow:0 4px 15px rgba(37,211,102,.25);flex-shrink:0}
.btn-play:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.35)}
.btn-play.playing{background:linear-gradient(135deg,#ff3b30,#ff6b6b);box-shadow:0 4px 15px rgba(255,59,48,.25)}
.btn-pause{background:linear-gradient(135deg,#ff9500,#f5a623);box-shadow:0 4px 15px rgba(255,149,0,.25)}
.btn-pause:hover{box-shadow:0 6px 20px rgba(255,149,0,.35)}
.btn-pause.resuming{background:linear-gradient(135deg,#25d366,#128c7e);box-shadow:0 4px 15px rgba(37,211,102,.25)}
.btn-restart{background:linear-gradient(135deg,#00a884,#128c7e);box-shadow:0 4px 15px rgba(0,168,132,.25)}
.btn-restart:hover{box-shadow:0 6px 20px rgba(0,168,132,.35)}

/* CONTENT */
.content{flex:1;display:flex;gap:16px;overflow:hidden;padding:12px 16px}

/* IPHONE */
.phone-wrap{flex-shrink:0;display:flex;align-items:flex-start}
.iphone{width:340px;background:#000;border-radius:44px;overflow:hidden;box-shadow:0 0 0 2.5px #3a3a3a,0 0 0 5px #1a1a1a,0 25px 80px rgba(0,0,0,.5);position:relative}
.dynamic-island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:35px;background:#000;border-radius:18px;z-index:100}
.status-bar{background:#121b22;padding:14px 26px 0;display:flex;justify-content:space-between;align-items:center;height:52px;z-index:50;position:relative}
.status-time{font-size:15px;font-weight:700;color:#fff}
.status-icons{display:flex;align-items:center;gap:5px}
.status-icons svg{fill:#fff}
.wa-nav{background:#121b22;padding:4px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid rgba(255,255,255,.06)}
.wa-back svg{fill:#00a884}
.wa-avatar{width:32px;height:32px;border-radius:50%;background:#6b5b7b;display:flex;align-items:center;justify-content:center;color:#f0d0e8;font-size:11px;font-weight:700}
.wa-avatar.notif{background:#5b6b4b;color:#d0f0c8}
.wa-avatar.alerta{background:#6b4b4b;color:#f0c8c8}
.wa-contact{flex:1;margin-left:2px}
.wa-name{color:#e9edef;font-size:15px;font-weight:600}
.wa-status{color:rgba(233,237,239,.5);font-size:11px}
.wa-actions{display:flex;gap:16px}
.wa-actions svg{fill:#00a884}
.chat-area{height:calc(100vh - 240px);min-height:420px;overflow-y:auto;padding:6px 12px 12px;background:#0b141a;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:2px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.4}
.empty-state .ei{font-size:32px}
.empty-state .et{color:rgba(233,237,239,.5);font-size:12px;text-align:center;line-height:1.6}
.date-pill{display:flex;justify-content:center;margin:8px 0 4px;animation:fadeIn .3s}
.date-pill span{background:#182229;border-radius:7px;padding:4px 12px;font-size:11px;color:rgba(233,237,239,.6);font-weight:500}
.enc-notice{display:flex;justify-content:center;margin:2px 0 8px;animation:fadeIn .3s}
.enc-notice span{background:rgba(25,54,67,.7);border-radius:7px;padding:6px 14px;font-size:10.5px;color:#f7dfa4;text-align:center;line-height:1.4;max-width:88%}
.msg-row{display:flex;margin:2px 0;animation:fadeIn .3s}
.msg-row.bot{justify-content:flex-start}
.msg-row.user{justify-content:flex-end}
.msg-row.system{justify-content:center;margin:5px 0}
.bubble{max-width:82%;padding:5px 8px 3px}
.bubble.bot{background:#1f2c34;border-radius:0 16px 16px 16px}
.bubble.user{background:#005c4b;border-radius:16px 0 16px 16px}
.bubble .text{font-size:13.5px;color:#e9edef;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.bubble .meta{display:flex;justify-content:flex-end;align-items:center;gap:3px;margin-top:1px}
.bubble .time{font-size:10px;color:rgba(233,237,239,.4)}
.sys-badge{background:rgba(25,54,67,.7);border-radius:7px;padding:4px 12px;font-size:10.5px;color:#f7dfa4;max-width:92%;text-align:center}
.typing{display:flex;align-items:center;gap:4px;background:#1f2c34;border-radius:0 16px 16px 16px;padding:10px 14px;width:fit-content;margin:3px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#5a6b75;animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
.input-bar{background:#121b22;padding:5px 8px 26px;display:flex;align-items:flex-end;gap:6px}
.input-field{flex:1;background:#1f2c34;border:none;border-radius:18px;padding:7px 12px;font-size:14px;color:rgba(233,237,239,.35)}
.input-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SYSTEM SCREEN */
.sys-screen{flex:1;display:flex;flex-direction:column;background:#0f1318;border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;min-width:240px}
.sys-header{background:#13181f;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sys-brand{display:flex;align-items:center;gap:8px}
.sys-brand .icon{font-size:16px}
.sys-brand .name{font-size:13px;font-weight:700}
.sys-brand .name .s{background:linear-gradient(135deg,#f7b731,#fd9644);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sys-brand .name .d{color:rgba(255,255,255,.3);font-weight:400}
.sys-tabs{display:flex;gap:2px}
.sys-tab{padding:4px 10px;font-size:9px;font-weight:600;border-radius:6px;color:rgba(255,255,255,.3);letter-spacing:.3px}
.sys-tab.active{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sys-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent}
.sys-body::-webkit-scrollbar{width:3px}
.sys-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}
.sys-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.3}
.sys-empty .se-icon{font-size:28px}
.sys-empty .se-text{font-size:11px;text-align:center;line-height:1.5;color:rgba(255,255,255,.5)}

/* System event cards */
.sys-event{animation:slideRight .4s ease;margin-bottom:10px}
.se-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
.se-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.se-icon{font-size:14px}
.se-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);flex:1}
.se-time{font-size:9px;color:rgba(255,255,255,.2);font-weight:500}
.se-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.4px;text-transform:uppercase}
.se-tag.green{background:rgba(37,211,102,.12);color:#25d366}
.se-tag.orange{background:rgba(255,149,0,.12);color:#ff9500}
.se-tag.red{background:rgba(255,59,48,.12);color:#ff3b30}
.se-tag.blue{background:rgba(0,168,132,.12);color:#00a884}
.se-tag.purple{background:rgba(175,130,255,.12);color:#af82ff}
.se-body{padding:10px 12px}
.se-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.se-label{font-size:10px;color:rgba(255,255,255,.3);font-weight:500}
.se-value{font-size:10.5px;color:rgba(255,255,255,.65);font-weight:600;text-align:right;max-width:60%}
.se-divider{height:1px;background:rgba(255,255,255,.04);margin:6px 0}
.se-status-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,.015)}
.se-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.se-status-dot.green{background:#25d366}
.se-status-dot.orange{background:#ff9500;animation:pulse 1.5s infinite}
.se-status-dot.red{background:#ff3b30}
.se-status-dot.blue{background:#00a884;animation:pulse 1.5s infinite}
.se-status-text{font-size:10px;color:rgba(255,255,255,.5)}
.se-progress{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin:8px 12px 6px}
.se-progress-fill{height:100%;border-radius:2px;transition:width .8s ease}
.se-progress-fill.green{background:#25d366}
.se-progress-fill.orange{background:#ff9500}

/* CRM Mockup card */
.crm-lead-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-bottom:10px;animation:fadeInScale .4s}
.crm-lead-header{padding:8px 12px;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04)}
.crm-lead-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.6)}
.crm-project-id{font-size:9px;color:rgba(255,255,255,.25);font-weight:600;letter-spacing:.3px}
.crm-lead-body{padding:10px 12px}
.crm-field{display:flex;justify-content:space-between;padding:3px 0}
.crm-field .label{font-size:9.5px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.crm-field .value{font-size:10.5px;color:rgba(255,255,255,.6);font-weight:500}
.crm-status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:6px}
.crm-status-pill.trafego{background:rgba(175,130,255,.12);color:#af82ff}
.crm-status-pill.qualif{background:rgba(255,149,0,.12);color:#ff9500}
.crm-status-pill.qualified{background:rgba(37,211,102,.12);color:#25d366}
.crm-status-pill.desqualif{background:rgba(255,59,48,.12);color:#ff3b30}
.crm-status-pill.fup{background:rgba(0,168,255,.12);color:#00a8ff}
.crm-status-pill.invalido{background:rgba(255,59,48,.12);color:#ff3b30}

@media(max-width:800px){body{flex-direction:column;overflow-y:auto}.sidebar{width:100%;min-width:100%;height:auto;max-height:30vh}.main{height:auto;min-height:70vh}.content{padding:10px;flex-direction:column;align-items:center}.iphone{width:100%;max-width:340px}.sys-screen{min-height:400px;width:100%}}
</style>
</head>

  <div class="sidebar-header">
    <div class="sidebar-logo"><span class="sun">☀️</span><span class="brand">Evolve Energia Solar</span></div>

  </div>

</div>
<div class="main">

    <div class="main-top-left">
      <div class="app-title"><span class="sol">SOl.estrateg.IA</span></div>
      <div class="flow-label" id="flowLabel">📥 Flow 1 - META</div>

    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="btn-play" id="btnPlay" onclick="doPlay()">▶ Iniciar</button>

        <div class="status-bar">

          <div class="status-icons">
            <svg width="17" height="12" viewBox="0 0 18 12"><rect x="1" y="3.5" width="2.5" height="8.5" rx=".5" opacity=".4"/><rect x="5" y="2.5" width="2.5" height="9.5" rx=".5" opacity=".6"/><rect x="9" y="1.5" width="2.5" height="10.5" rx=".5" opacity=".8"/><rect x="13" y=".5" width="2.5" height="11.5" rx=".5"/></svg>

<script>
const T = () => new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
setInterval(()=>{document.getElementById("statusTime").textContent=T()},30000);

const FLOWS = {
flow1:{
  name:"Flow 1 - META",icon:"📥",subtitle:"Lead via formulário Meta Ads",
  contact:"Fabiano Costa",avatar:"FC",avatarClass:"",badge:"conversa",badgeText:"Conversa",group:"flows",
  sysTabs:["CRM","WhatsApp API"],

// System event renderers
function renderSysEvent(ev){
  const sb=document.getElementById("sysBody");
  if(ev.type==="status"){
    sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-header"><span class="se-icon">${ev.icon}</span><span class="se-title">${ev.title}</span><span class="se-tag ${ev.tagClass}">${ev.tag}</span></div><div class="se-status-bar"><div class="se-status-dot ${ev.dotClass}"></div><span class="se-status-text">${ev.status}</span></div></div></div>`;
  } else if(ev.type==="crm"){
    let fields=ev.fields.map(f=>`<div class="crm-field"><span class="label">${f[0]}</span><span class="value">${f[1]}</span></div>`).join("");
    sb.innerHTML+=`<div class="sys-event"><div class="crm-lead-card"><div class="crm-lead-header"><span class="crm-lead-title">${ev.title}</span><span class="crm-project-id">${ev.projectId}</span></div><div class="crm-lead-body">${fields}<div class="se-divider"></div><div class="crm-status-pill ${ev.statusPill}">● ${ev.statusText}</div></div></div></div>`;
  } else if(ev.type==="crmUpdate"){
    // Update existing CRM card status and progress
    const pills=sb.querySelectorAll(".crm-status-pill");
    if(pills.length){const last=pills[pills.length-1];last.className="crm-status-pill "+ev.statusPill;last.textContent="● "+ev.statusText}
    const bars=sb.querySelectorAll(".se-progress-fill");
    if(bars.length){bars[bars.length-1].style.width=ev.progress+"%";bars[bars.length-1].className="se-progress-fill "+ev.progressClass}
    else{sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-header"><span class="se-icon">📊</span><span class="se-title">Progresso Qualificação</span><span class="se-tag orange">${ev.progress}%</span></div><div class="se-progress"><div class="se-progress-fill ${ev.progressClass}" style="width:${ev.progress}%"></div></div>${ev.extraField?`<div class="se-status-bar"><div class="se-status-dot orange"></div><span class="se-status-text">${ev.extraField[0]}: ${ev.extraField[1]}</span></div>`:""}</div></div>`}
    if(ev.extraField){
      sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-status-bar"><div class="se-status-dot blue"></div><span class="se-status-text">📝 ${ev.extraField[0]}: <strong style="color:rgba(255,255,255,.7)">${ev.extraField[1]}</strong></span></div></div></div>`}
  } else if(ev.type==="score"){
    sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-header"><span class="se-icon">${ev.icon}</span><span class="se-title">${ev.title}</span></div><div class="se-body"><div class="se-row"><span class="se-label">SCORE</span><span class="se-value" style="font-size:18px;font-weight:800;color:${ev.tempColor}">${ev.score}</span></div><div class="se-row"><span class="se-label">TEMPERATURA</span><span class="se-value" style="color:${ev.tempColor};font-weight:700">${ev.temp}</span></div></div></div></div>`;
  } else if(ev.type==="intent"){
    let rows=ev.intents.map(i=>`<div class="se-row"><span class="se-label" style="color:${i.color};font-weight:600">${i.label}</span><span class="se-value">${i.conf}</span></div>`).join("");
    sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-header"><span class="se-icon">${ev.icon}</span><span class="se-title">${ev.title}</span><span class="se-tag purple">IA</span></div><div class="se-body">${rows}</div></div></div>`;
  } else if(ev.type==="fup"){
    sb.innerHTML+=`<div class="sys-event"><div class="se-card"><div class="se-header"><span class="se-icon">📅</span><span class="se-title">Etapa ${ev.stage}/${ev.total} — Dia ${ev.day}</span><span class="se-tag blue">${ev.progress}%</span></div><div class="se-status-bar"><div class="se-status-dot blue"></div><span class="se-status-text">${ev.trigger}</span></div><div class="se-progress"><div class="se-progress-fill ${ev.progress>=100?"green":"orange"}" style="width:${ev.progress}%"></div></div></div></div>`;
  }
  scrollSys();
}

function fullStop(){
  timeouts.forEach(clearTimeout);timeouts=[];
  isPlaying=false;isPaused=false;hideTyping();
  playStartTime=0;pausedElapsed=0;firedMsgIndexes.clear();firedSysIndexes.clear();
  showButtons(true,false,false);
  document.querySelectorAll(".flow-card").forEach(c=>c.classList.remove("playing"));
  document.getElementById("contactStatus").textContent="online";
}

function scheduleEvents(offsetMs){
  const chat=document.getElementById("chatArea");
  const f=FLOWS[activeFlow];const isNotif=activeFlow.startsWith("notif");const msgs=f.messages;
  // WhatsApp messages
  msgs.forEach((msg,i)=>{
    if(firedMsgIndexes.has(i))return;
    const d=msg.delay+500-offsetMs;
    if(d<0){return;}// should have fired already, skip
    if(msg.from==="bot"){const tid=setTimeout(()=>{if(!isPlaying||isPaused)return;showTyping();document.getElementById("contactStatus").textContent=isNotif?"enviando...":"digitando..."},Math.max(0,d-700));timeouts.push(tid)}
    const id=setTimeout(()=>{
      if(!isPlaying||isPaused)return;
      firedMsgIndexes.add(i);hideTyping();chat.appendChild(createBubble(msg));scrollChat();
      if(msg.from!=="bot")document.getElementById("contactStatus").textContent="online";
      // Check if last message
      if(i===msgs.length-1){setTimeout(()=>{if(isPlaying){isPlaying=false;isPaused=false;showButtons(false,false,true);document.querySelectorAll(".flow-card").forEach(c=>c.classList.remove("playing"));document.getElementById("contactStatus").textContent="online"}},500)}
    },d);timeouts.push(id);
  });
  // System events
  f.sysEvents.forEach((ev,i)=>{
    if(firedSysIndexes.has(i))return;
    const d=ev.delay+500-offsetMs;
    if(d<0)return;
    const id=setTimeout(()=>{if(!isPlaying||isPaused)return;firedSysIndexes.add(i);renderSysEvent(ev)},d);timeouts.push(id);
  });
}

function doPlay(){
  isPlaying=true;isPaused=false;
  playStartTime=Date.now();pausedElapsed=0;
  firedMsgIndexes.clear();firedSysIndexes.clear();
  // Init chat
  const chat=document.getElementById("chatArea");chat.innerHTML="";
  const sb=document.getElementById("sysBody");sb.innerHTML="";
  const pill=document.createElement("div");pill.className="date-pill";pill.innerHTML="<span>Today</span>";chat.appendChild(pill);
  const enc=document.createElement("div");enc.className="enc-notice";enc.innerHTML="<span>🔒 Messages and calls are end-to-end encrypted.</span>";chat.appendChild(enc);
  showButtons(false,true,true);
  const card=document.getElementById("card-"+activeFlow);if(card)card.classList.add("playing");
  scheduleEvents(0);
}

function doPause(){
  const btn=document.getElementById("btnPause");
  if(!isPaused){
    // PAUSE
    isPaused=true;
    pausedElapsed+=(Date.now()-playStartTime);
    timeouts.forEach(clearTimeout);timeouts=[];
    hideTyping();
    btn.textContent="▶ Continuar";btn.classList.add("resuming");
    document.getElementById("contactStatus").textContent="pausado";
  } else {
    // RESUME
    isPaused=false;
    playStartTime=Date.now();
    btn.textContent="⏸ Pausar";btn.classList.remove("resuming");
    document.getElementById("contactStatus").textContent="online";
    scheduleEvents(pausedElapsed);
  }
}

function doRestart(){
  timeouts.forEach(clearTimeout);timeouts=[];
  hideTyping();
  isPlaying=false;isPaused=false;
  pausedElapsed=0;firedMsgIndexes.clear();firedSysIndexes.clear();
  document.querySelectorAll(".flow-card").forEach(c=>c.classList.remove("playing"));
  document.getElementById("btnPause").textContent="⏸ Pausar";
  document.getElementById("btnPause").classList.remove("resuming");
  doPlay();
}

renderSidebar();updateAll();document.getElementById("statusTime").textContent=T();
</script>
</body>
</html>
